name: Copilot CI Proxy

on:
  pull_request_target:

permissions: {}

jobs:
  dispatch-ci:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'copilot-workspace[bot]' ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    steps:
      - name: Trigger main CI via repository dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CI_DISPATCH_TOKEN }}
          event-type: trigger-main-ci
          client-payload: '{"pr_number": "${{ github.event.pull_request.number }}", "head_sha": "${{ github.event.pull_request.head.sha }}", "head_ref": "${{ github.event.pull_request.head.ref }}"}'
