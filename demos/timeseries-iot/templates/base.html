<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>📡 Station Argos-7 — IoT Sensor Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #070b14; --bg-deep: #040812; --surface: #0c1528;
      --surface-hover: #101d33; --border: #152040; --border-glow: #1a2d55;
      --text: #c8d8f0; --muted: #5c7ca0; --dim: #3d5575;
      --accent: #38bdf8; --accent-glow: #0ea5e9; --accent-dim: #0c4a6e;
      --accent-hover: #7dd3fc; --danger: #ef4444; --danger-dim: #7f1d1d;
      --success: #10b981; --success-dim: #065f46;
      --warning: #f59e0b; --warning-dim: #78350f;
      --blue: #38bdf8; --blue-dim: #0c3d5e; --ghost: rgba(56,189,248,0.08);
      --temp-hot: #ef4444; --temp-warm: #f59e0b; --temp-cool: #38bdf8; --temp-cold: #818cf8;
      --radius: 6px; --radius-lg: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(56,189,248,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(14,165,233,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(56,189,248,0.02) 0%, transparent 50%);
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-shadow: 0 0 8px rgba(56,189,248,0.4); }

    .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
    @media (min-width: 768px) { .container { padding: 1.5rem; } }

    /* --- Header --- */
    header {
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border-glow);
      padding: 0.75rem 0;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), var(--blue), var(--accent-glow), transparent);
      animation: header-scan 4s linear infinite;
    }
    @keyframes header-scan {
      0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; }
    }
    header .container {
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    }
    header h1 {
      font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; white-space: nowrap;
    }
    @media (min-width: 768px) { header h1 { font-size: 1.3rem; } }
    header h1 .glyph { color: var(--accent); text-shadow: 0 0 12px rgba(56,189,248,0.5); }
    header .badge {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--accent-dim), var(--border-glow));
      color: var(--accent); padding: 3px 10px; border-radius: 99px;
      border: 1px solid var(--accent-dim); text-transform: uppercase;
      animation: badge-pulse 3s ease-in-out infinite;
    }
    @keyframes badge-pulse {
      0%, 100% { box-shadow: 0 0 4px rgba(56,189,248,0.2); }
      50% { box-shadow: 0 0 12px rgba(56,189,248,0.5); }
    }

    /* --- Lore panel --- */
    .lore-panel {
      background: linear-gradient(135deg, rgba(12,21,40,0.95), rgba(4,8,18,0.98));
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-dim);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.7;
      position: relative;
      overflow: hidden;
    }
    .lore-panel::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 100%;
      background: linear-gradient(90deg, rgba(56,189,248,0.03), transparent 30%);
      pointer-events: none;
    }
    .lore-panel .lore-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--accent-dim);
      margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .lore-panel .lore-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .lore-panel em { color: var(--accent); font-style: normal; font-weight: 600; }
    .lore-panel strong { color: var(--danger); font-weight: 700; }

    /* --- Tab navigation --- */
    .tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .tab {
      padding: 0.6rem 1.2rem; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dim); cursor: pointer; border: none; background: none;
      font-family: inherit; border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--accent); }
    .tab.active {
      color: var(--accent); border-bottom-color: var(--accent);
      background: var(--ghost);
    }

    /* --- Card --- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    }
    .card h2 {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 1rem; color: var(--accent-dim);
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* --- Sensor grid --- */
    .sensor-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 600px) { .sensor-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1000px) { .sensor-grid { grid-template-columns: repeat(3, 1fr); } }

    /* --- Sensor card --- */
    .sensor-card {
      background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .sensor-card:hover {
      border-color: var(--accent-dim);
      box-shadow: 0 0 16px rgba(56,189,248,0.08);
    }
    .sensor-name {
      font-weight: 700; font-size: 0.85rem; color: var(--accent);
      text-shadow: 0 0 8px rgba(56,189,248,0.3); margin-bottom: 0.5rem;
    }
    .sensor-metrics {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
    }
    .metric {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.5rem;
      text-align: center;
    }
    .metric-label {
      font-size: 0.55rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--dim); margin-bottom: 0.2rem;
    }
    .metric-value {
      font-size: 1rem; font-weight: 700; line-height: 1.2;
    }
    .metric-unit { font-size: 0.6rem; color: var(--dim); }

    /* Temperature colors */
    .temp-hot { color: var(--temp-hot); }
    .temp-warm { color: var(--temp-warm); }
    .temp-cool { color: var(--temp-cool); }
    .temp-cold { color: var(--temp-cold); }

    /* Battery indicator */
    .battery { display: flex; align-items: center; gap: 0.3rem; justify-content: center; }
    .battery-bar {
      width: 30px; height: 10px; border: 1px solid var(--dim);
      border-radius: 2px; position: relative; overflow: hidden;
    }
    .battery-fill {
      position: absolute; top: 0; left: 0; height: 100%;
      border-radius: 1px; transition: width 0.3s;
    }
    .battery-ok { background: var(--success); }
    .battery-warn { background: var(--warning); }
    .battery-crit { background: var(--danger); }

    /* --- Readings table --- */
    .readings-table {
      width: 100%; border-collapse: collapse; font-size: 0.75rem;
    }
    .readings-table th {
      text-align: left; font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim);
      padding: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .readings-table td {
      padding: 0.4rem 0.5rem; border-bottom: 1px solid rgba(21,32,64,0.5);
      color: var(--text);
    }
    .readings-table tr:hover td { background: var(--ghost); }

    /* --- Code highlight --- */
    .code-snippet {
      background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem 1rem;
      font-size: 0.75rem; color: var(--accent); margin: 0.5rem 0;
      white-space: pre; overflow-x: auto; line-height: 1.6;
    }
    .code-snippet .kw  { color: #c084fc; }
    .code-snippet .str { color: #86efac; }
    .code-snippet .num { color: #fbbf24; }
    .code-snippet .cm  { color: var(--dim); font-style: italic; }

    /* --- Buttons --- */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem; border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-dim), var(--accent-glow));
      color: #fff; border: 1px solid var(--accent-dim);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-glow), var(--accent));
      box-shadow: 0 0 16px rgba(56,189,248,0.3);
    }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.65rem; }

    /* --- HTMX indicator --- */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request { opacity: 0.6; transition: opacity 0.2s; }

    /* --- Auto-refresh notice --- */
    .refresh-notice {
      font-size: 0.65rem; color: var(--dim); text-align: right;
      margin-bottom: 0.5rem; letter-spacing: 0.05em;
      display: flex; align-items: center; justify-content: flex-end; gap: 0.5rem;
    }
    .live-dot {
      display: inline-block; width: 8px; height: 8px;
      background: var(--success); border-radius: 50%;
      animation: live-pulse 2s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(16,185,129,0.6);
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px rgba(16,185,129,0.6); }
      50% { opacity: 0.4; box-shadow: 0 0 2px rgba(16,185,129,0.2); }
    }

    /* --- Filter bar --- */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end;
      margin-bottom: 1rem; padding: 0.75rem 1rem;
      background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .filter-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .filter-label {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--dim);
    }
    .filter-input {
      font-family: inherit; font-size: 0.75rem;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.4rem 0.6rem; outline: none; min-width: 150px;
    }
    .filter-input:focus { border-color: var(--accent-dim); box-shadow: 0 0 8px rgba(56,189,248,0.2); }
    .filter-input option { background: var(--surface); color: var(--text); }
    /* Style the date input for dark theme */
    .filter-input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

    /* --- Empty state --- */
    .empty {
      text-align: center; padding: 2.5rem 1rem; color: var(--dim);
      font-size: 0.85rem;
    }
    .empty .empty-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; opacity: 0.4; }
    .empty p { font-style: italic; }

    /* --- Load more / infinite scroll --- */
    .load-more {
      text-align: center; padding: 1rem; color: var(--dim);
      font-size: 0.75rem;
    }
    .scroll-sentinel {
      height: 1px; width: 100%;
    }
    .loading-indicator {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 1rem; color: var(--dim); font-size: 0.75rem;
    }
    .loading-spinner {
      width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Scanline overlay --- */
    body::after {
      content: '';
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px
      );
      pointer-events: none; z-index: 9999;
    }

    /* --- Footer --- */
    footer {
      text-align: center; padding: 1.5rem; font-size: 0.65rem;
      color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase;
      border-top: 1px solid var(--border); margin-top: 2rem;
    }
    footer em { color: var(--accent-dim); font-style: normal; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1><span class="glyph">📡</span> Station Argos-7</h1>
      <span class="badge">IoT Sensor Dashboard // Time-Series</span>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer>
    <em>coodie</em> · Pydantic-native Cassandra ORM · Time-Series IoT Demo · Powered by ScyllaDB
  </footer>
</body>
</html>
