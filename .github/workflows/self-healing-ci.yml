name: Self-Healing CI

# NOTE: This workflow is called from CI / Unit Tests / Integration Tests /
# Benchmarks / Demo Apps on failure via workflow_call.  This avoids the
# approval requirement that workflow_run triggers impose for bot-initiated
# runs (e.g. copilot-swe-agent).
#
# GH_PAT secret — required for @copilot mentions to work on Copilot-authored PRs
# ─────────────────────────────────────────────────────────────────────────────
# The "Comment on pull request" step uses secrets.GH_PAT so the comment appears
# to come from a real user account.  Copilot ignores @copilot mentions that are
# posted by the GitHub Actions bot (GITHUB_TOKEN) on PRs it authored.
#
# Create a fine-grained Personal Access Token with the following settings:
#   URL:          https://github.com/settings/personal-access-tokens/new
#   Resource owner: fruch (or the org that owns this repo)
#   Repository access: Only select repositories → fruch/coodie
#   Repository permissions:
#     • Pull requests: Read and write   ← needed to post PR comments
#
# NOTE: `gh pr comment` uses the GitHub GraphQL API, which fine-grained PATs
# do NOT support, causing HTTP 401 errors.  The comment step below uses the
# REST API (`gh api POST …/issues/{n}/comments`) which works with fine-grained
# PATs and avoids this limitation.
#
# Store the generated token as a repository secret named GH_PAT:
#   https://github.com/fruch/coodie/settings/secrets/actions/new

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID to inspect'
        required: true
        type: number

jobs:
  on-failure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
      models: read
    steps:
      - uses: actions/checkout@v6

      - name: Find associated pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run_id="${{ inputs.run_id }}"
            head_branch=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}" --jq '.head_branch')
          else
            head_branch="${HEAD_REF:-$REF_NAME}"
          fi

          # Try to find an open PR for the branch that triggered the failed run
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${head_branch}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$pr_number" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "number=${pr_number}" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect failed job logs
        if: steps.pr.outputs.found == 'true'
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run_id="${{ inputs.run_id }}"
            workflow_name=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}" --jq '.name')
            run_url=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}" --jq '.html_url')
            head_sha=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}" --jq '.head_sha')
          else
            run_id="${{ github.run_id }}"
            workflow_name="${{ github.workflow }}"
            run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            head_sha="${{ github.sha }}"
          fi

          # Collect logs from all failed jobs
          export REPO="${{ github.repository }}"
          export RUN_ID="${run_id}"
          source .github/scripts/collect-failed-logs.sh

          # Write outputs
          {
            echo "workflow_name=${workflow_name}"
            echo "run_url=${run_url}"
            echo "head_sha=${head_sha}"
          } >> "$GITHUB_OUTPUT"

          # Store logs in a file for the AI summariser (too large for output variable)
          echo "${FAILED_LOGS}" > /tmp/failed_logs.txt
          # Store links in a separate file for the PR comment
          echo "${FAILED_LINKS}" > /tmp/failed_links.txt

      - name: Inspect PR checks
        if: steps.pr.outputs.found == 'true'
        id: inspect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number="${{ steps.pr.outputs.number }}"
          # Run the diagnostic script and capture its JSON output.
          # Non-zero exit is expected (it exits 1 when failures exist).
          python3 .github/scripts/inspect_pr_checks.py \
            --pr "${pr_number}" --json \
            > /tmp/inspect_checks.json 2>&1 || true

      - name: Summarize failure with Copilot
        if: steps.pr.outputs.found == 'true'
        id: copilot_summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/summarize-failure.py \
            --logs-file /tmp/failed_logs.txt \
            --output-file /tmp/copilot_summary.txt

      - name: Comment on pull request
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          pr_number="${{ steps.pr.outputs.number }}"
          workflow_name="${{ steps.logs.outputs.workflow_name }}"
          run_url="${{ steps.logs.outputs.run_url }}"
          head_sha="${{ steps.logs.outputs.head_sha }}"

          # Build comment from parts — avoid heredoc to prevent shell
          # expansion of $, backticks, etc. inside CI log content.
          {
            echo "## CI Failure: ${workflow_name}"
            echo ""
            echo "**Commit:** \`${head_sha}\`"
            echo "**Run:** ${run_url}"
            echo ""
            echo "### 🤖 Copilot Failure Analysis"
            cat /tmp/copilot_summary.txt
            echo ""
            echo "---"
            echo ""
            echo "### Failed Jobs"
            cat /tmp/failed_links.txt
            echo ""

            # Append failure snippets from inspect_pr_checks.py when available
            if [ -s /tmp/inspect_checks.json ]; then
              snippets=$(python3 .github/scripts/format_snippets.py /tmp/inspect_checks.json) || true
              if [ -n "$snippets" ]; then
                echo "### 📋 Failure Snippets"
                echo ""
                echo "$snippets"
              fi
            fi

            echo ""
            echo "@copilot please investigate the failure and suggest a fix."
          } > /tmp/comment.md

          # Use REST API (gh api POST) instead of gh pr comment: the latter uses
          # the GraphQL API which fine-grained PATs do not support.
          # jq is pre-installed on all ubuntu-latest GitHub Actions runners.
          jq -Rs '{body: .}' /tmp/comment.md > /tmp/comment.json

          # Try GH_PAT first (so @copilot mentions work on Copilot-authored PRs).
          # Fall back to GITHUB_TOKEN if the PAT is missing or returns an auth error,
          # and post a separate diagnostic comment about the broken PAT.
          pat_problem=""
          posted=false
          if [ -n "$GH_PAT" ]; then
            if GH_TOKEN="$GH_PAT" gh api --method POST \
                "repos/${{ github.repository }}/issues/${pr_number}/comments" \
                --input /tmp/comment.json; then
              posted=true
            else
              echo "::warning::GH_PAT authentication failed — falling back to GITHUB_TOKEN."
              pat_problem="expired or invalid"
            fi
          else
            echo "::warning::GH_PAT secret is not set — falling back to GITHUB_TOKEN."
            pat_problem="not configured"
          fi

          if [ "$posted" = false ]; then
            # Post the CI failure comment with GITHUB_TOKEN
            gh api --method POST \
              "repos/${{ github.repository }}/issues/${pr_number}/comments" \
              --input /tmp/comment.json

            # Post a separate warning comment about the broken PAT
            docs_url="https://github.com/${{ github.repository }}/blob/${{ github.sha }}/CONTRIBUTING.md#self-healing-ci--gh_pat-setup"
            {
              echo "## ⚠️ Self-Healing CI: \`GH_PAT\` is ${pat_problem}"
              echo ""
              echo "The CI failure comment above was posted by \`github-actions[bot]\`."
              echo "**Copilot will not respond** to \`@copilot\` mentions in bot-posted comments on Copilot-authored PRs."
              echo ""
              echo "To fix this, a repository admin must configure the \`GH_PAT\` secret with a valid fine-grained Personal Access Token."
              echo ""
              echo "**Setup instructions:** [CONTRIBUTING.md — Self-Healing CI / GH_PAT Setup](${docs_url})"
            } > /tmp/pat_warning.md
            jq -Rs '{body: .}' /tmp/pat_warning.md > /tmp/pat_warning.json
            gh api --method POST \
              "repos/${{ github.repository }}/issues/${pr_number}/comments" \
              --input /tmp/pat_warning.json
          fi
